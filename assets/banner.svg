<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    
    <!-- Neon Blue Gradient -->
    <linearGradient id="neon-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>

    <!-- Neon Violet Gradient -->
    <linearGradient id="neon-violet" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#6b21a8" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }
    @keyframes dash {
      to {
        stroke-dashoffset: -40;
      }
    }
    @keyframes flow {
      0% { stroke-dashoffset: 100; }
      100% { stroke-dashoffset: 0; }
    }
    .grid-line {
      stroke: #334155;
      stroke-width: 0.5;
      opacity: 0.3;
    }
    .skip-conn {
      stroke: url(#neon-violet);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 8 4;
      animation: dash 2s linear infinite;
      filter: url(#glow);
    }
    .main-path {
      stroke: url(#neon-blue);
      stroke-width: 4;
      stroke-linecap: round;
      filter: url(#glow);
    }
    .node-text {
      font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
      font-weight: bold;
      fill: #ffffff;
      font-size: 14px;
    }
    .title-text {
      font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
      font-weight: 800;
      font-size: 42px;
      fill: #f8fafc;
      letter-spacing: 2px;
    }
    .subtitle-text {
      font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
      font-weight: 400;
      font-size: 18px;
      fill: #94a3b8;
    }
  </style>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg-grad)" />

  <!-- Animated Grid Backing -->
  <g>
    <line x1="0" y1="50" x2="1200" y2="50" class="grid-line" />
    <line x1="0" y1="100" x2="1200" y2="100" class="grid-line" />
    <line x1="0" y1="150" x2="1200" y2="150" class="grid-line" />
    <line x1="0" y1="200" x2="1200" y2="200" class="grid-line" />
    <line x1="0" y1="250" x2="1200" y2="250" class="grid-line" />
    
    <line x1="150" y1="0" x2="150" y2="300" class="grid-line" />
    <line x1="300" y1="0" x2="300" y2="300" class="grid-line" />
    <line x1="450" y1="0" x2="450" y2="300" class="grid-line" />
    <line x1="600" y1="0" x2="600" y2="300" class="grid-line" />
    <line x1="750" y1="0" x2="750" y2="300" class="grid-line" />
    <line x1="900" y1="0" x2="900" y2="300" class="grid-line" />
    <line x1="1050" y1="0" x2="1050" y2="300" class="grid-line" />
  </g>

  <!-- Schematic Diagram on the right side -->
  <!-- Main Path Flow -->
  <path d="M 750,150 L 950,150" class="main-path" />
  <!-- Skip Connection Path (Arcing above) -->
  <path d="M 750,150 C 800,50 900,50 950,150" class="skip-conn" />
  
  <!-- Add block node -->
  <circle cx="950" cy="150" r="22" fill="#1e1b4b" stroke="#c084fc" stroke-width="3" filter="url(#glow)" />
  <text x="950" y="155" text-anchor="middle" class="node-text" font-size="18">+</text>

  <!-- Weight block node -->
  <rect x="800" y="125" width="80" height="50" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="3" filter="url(#glow)" />
  <text x="840" y="154" text-anchor="middle" class="node-text">F(x)</text>

  <!-- Input Indicator node -->
  <circle cx="750" cy="150" r="10" fill="#38bdf8" />
  <text x="750" y="180" text-anchor="middle" class="node-text" font-size="12">x</text>

  <!-- Output Indicator node -->
  <circle cx="1020" cy="150" r="10" fill="#c084fc" />
  <text x="1020" y="180" text-anchor="middle" class="node-text" font-size="12">F(x) + x</text>

  <!-- Left Side Title Info -->
  <text x="80" y="130" class="title-text">Awesome Residual Connections</text>
  <text x="85" y="175" class="subtitle-text">The Highway of Deep Gradient Flow ⚡</text>
</svg>
